<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🎓 Student Dashboard</h1>

    <h3>Join Live Quiz</h3>

    <input type="text" id="studentName" placeholder="Enter Your Name"><br><br>

    <input type="text" id="quizCode" placeholder="Enter Quiz Code"><br><br>

    <button onclick="joinQuiz()">Join Quiz</button>

</div>

<script>
function joinQuiz() {

    let name = document.getElementById("studentName").value;
    let code = document.getElementById("quizCode").value;

    if(name=="" || code==""){
        alert("Please enter your name and quiz code.");
    }
    else{
        alert("Welcome " + name + "! Joining Quiz...");
        window.location.href="quiz.html";
    }

}
</script>

</body>
</html>
