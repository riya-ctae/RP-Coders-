<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Result</title>

<link rel="stylesheet" href="style.css">

</head>

<body onload="loadResult()">

<div class="container result-card">

<h1>🎉 Quiz Completed</h1>

<h2 id="studentName"></h2>

<p><b>Score:</b> <span id="score"></span> / <span id="total"></span></p>

<p><b>Percentage:</b> <span id="percentage"></span>%</p>

<button class="teacher"
onclick="window.location.href='leaderboard.html'">
View Leaderboard
</button>

<button class="student"
onclick="window.location.href='profile.html'">
My Profile
</button>

<button class="success"
onclick="window.location.href='student.html'">
Attempt Another Quiz
</button>

<button class="danger"
onclick="logout()">
Logout
</button>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
