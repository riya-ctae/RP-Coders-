<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Quiz Platform</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:400px;
            background:#fff;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
            text-align:center;
        }

        h1{
            color:#007bff;
            margin-bottom:10px;
        }

        p{
            margin-bottom:25px;
            color:#555;
        }

        button{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:none;
            border-radius:5px;
            font-size:18px;
            cursor:pointer;
            color:white;
        }

        .teacher{
            background:#28a745;
        }

        .teacher:hover{
            background:#218838;
        }

        .student{
            background:#007bff;
        }

        .student:hover{
            background:#0056b3;
        }

        footer{
            margin-top:20px;
            color:gray;
            font-size:14px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Live Quiz Platform</h1>

    <p>Select Your Role</p>

    <button class="teacher" onclick="teacherLogin()">
        Teacher Login
    </button>

    <button class="student" onclick="studentLogin()">
        Student Login
    </button>

    <footer>
        © 2026 Live Quiz Platform
    </footer>

</div>

<script>
function teacherLogin(){
    window.location.href="teacher.html";
}

function studentLogin(){
    window.location.href="student.html";
}
</script>

</body>
</html>
