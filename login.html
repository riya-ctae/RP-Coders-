<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Login</h2>

        <form id="loginForm">
            <input type="text" id="name" placeholder="Enter Name" required><br><br>
            <input type="email" id="email" placeholder="Enter Email" required><br><br>

            <input type="password" id="password" placeholder="Enter Password" required><br><br>

            <button type="button" onclick="registerUser()">Register</button>
            <button type="button" onclick="loginUser()">Login</button>
        </form>

        <br>

        <button onclick="location.href='student.html'">Student</button>
        <button onclick="location.href='teacher.html'">Teacher</button>
    </div> 
    <script src="script.js"></script>
</body>
</html>
